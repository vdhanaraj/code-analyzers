# Repo-root git hooks. Installed by ts/'s `prepare` script (pnpm install).
# Cheap LOCAL gate, not a substitute for CI. Fail closed, fail fast.

pre-commit:
  parallel: false
  commands:
    biome:
      # Staged JS/TS files only: autofix + re-stage.
      glob: "ts/**/*.{js,ts,jsx,tsx,json}"
      run: pnpm --dir ts exec biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    typecheck:
      run: pnpm --dir ts run typecheck

pre-push:
  commands:
    test:
      run: pnpm --dir ts run test
